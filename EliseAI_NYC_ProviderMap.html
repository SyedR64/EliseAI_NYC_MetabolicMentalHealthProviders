<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EliseAI NYC Combined Map (Data Room)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{--bg:#0b1220;--panel:#0f1b33;--ink:#e7eefc;--muted:#a8b7d6;--line:#223457;--btn:#1f3a6b;--btn2:#2a4b86;--chip:#132448}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--ink)}
  .wrap{display:grid;grid-template-columns:420px 1fr;height:100vh}
  .panel{padding:14px;overflow:auto;background:var(--panel);border-right:1px solid var(--line)}
  .map{height:100vh;width:100%}
  h2{margin:0 0 10px 0;font-size:18px}
  .muted{color:var(--muted);font-size:12px;line-height:1.35}
  .row{display:flex;gap:8px;align-items:center}
  input,select,button,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0a1429;color:var(--ink);outline:none}
  button{cursor:pointer;font-weight:700;background:var(--btn);transition:background .15s ease}
  button:hover{background:var(--btn2)}
  .toolbar2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
  .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
  .tab.active{outline:2px solid #7fb3ff;background:#2a4b86}
  .card{border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px;background:rgba(10,20,41,.35)}
  .name{font-weight:800;font-size:14px}
  .tiny{margin-top:2px;font-size:12px;color:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{font-size:11px;padding:4px 8px;border-radius:999px;border:1px solid var(--line);background:var(--chip);color:#cfe0ff}
  .detail{margin-top:10px;font-size:12px;line-height:1.4;white-space:pre-wrap}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .actions button{padding:9px;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <aside class="panel">
    <h2 id="mapTitle">EliseAI NYC Metabolic Provider Map</h2>
    <div class="muted">Combined offline data-room view. Toggle tabs for Metabolic vs Mental Health.</div>
    <div class="tabs">
      <button id="tabGLP" class="tab active">Metabolic</button>
      <button id="tabMH" class="tab">Mental Health</button>
    </div>
    <div style="margin-top:10px;"><input id="search" placeholder="Search name, NPI, city, type"/></div>
    <div class="toolbar2">
      <button id="allProviders">All Providers</button>
      <button id="clearPins">Clear pins</button>
      <button id="exportVisible">Export visible CSV</button>
    </div>
    <div class="toolbar2">
      <button id="nearest10">Nearest 10 to EliseAI</button>
      <button id="fitPins">Fit to pins</button>
      <button id="resetView">Reset view</button>
    </div>
    <div class="row" style="margin-bottom:8px;">
      <select id="sortBy">
        <option value="claims_desc">Sort: Claims (desc)</option>
        <option value="distance_asc">Sort: Distance to EliseAI (asc)</option>
        <option value="name_asc">Sort: Name (A->Z)</option>
        <option value="city_asc">Sort: City (A->Z)</option>
      </select>
    </div>
    <div id="meta" class="muted" style="margin:8px 0;"></div>
    <div id="list"></div>
  </aside>
  <div id="map" class="map"></div>
</div>

let mode = 'glp';
let PROVIDERS = GLP_DATA;
const pinned = new Map();
let nearest10Mode = false;
const detailOpen = new Set();

const map = L.map('map').setView([40.744, -73.99], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const layerPins = L.layerGroup().addTo(map);

function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');}
function fmtMiles(x){if(!Number.isFinite(x)) return '—'; if(x<1) return x.toFixed(2)+' mi'; return x.toFixed(1)+' mi';}
function haversineMiles(lat1, lon1, lat2, lon2){const toRad=(d)=>d*Math.PI/180;const R=3958.7613;const dLat=toRad(lat2-lat1);const dLon=toRad(lon2-lon1);const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));}
function makeIcon(){return L.icon({iconUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',shadowUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',iconAnchor:[12,41]});}

function claimsField(p){return (mode==='glp') ? (p.metabolic_total_claims??null) : (p.mh_total_claims??null);}
function benesField(p){return (mode==='glp') ? (p.metabolic_total_benes??null) : (p.mh_total_benes??null);}

function clearMapState(){layerPins.clearLayers(); pinned.clear(); detailOpen.clear();}

function pinProvider(p){
  if(pinned.has(p.npi)) return pinned.get(p.npi);
  if(!Number.isFinite(p.pin_lat)||!Number.isFinite(p.pin_lon)) return null;
  const dist=haversineMiles(ELISEAI_LAT,ELISEAI_LON,p.pin_lat,p.pin_lon);
  const popup = '<b>'+esc(p.name)+'</b><br>NPI '+esc(p.npi)+'<br>'+esc(p.city||'')+'<br>Distance: <b>'+fmtMiles(dist)+'</b>';
  const m=L.marker([p.pin_lat,p.pin_lon],{icon:makeIcon()}).addTo(layerPins).bindPopup(popup);
  pinned.set(p.npi,m); return m;
}
function fitPins(){ if(!pinned.size) return; const pts=[]; for(const m of pinned.values()) pts.push(m.getLatLng()); map.fitBounds(L.latLngBounds(pts).pad(0.15)); }
function setDetail(npi, html){ const el=document.getElementById('detail-'+npi); if(el) el.innerHTML=html; }

function toggleProvider(npi){
  const p=PROVIDERS.find(x=>x.npi===npi); if(!p) return;
  if(detailOpen.has(npi)){detailOpen.delete(npi); setDetail(npi,''); const b=document.getElementById('btn-'+npi); if(b)b.textContent='Pin + load contact'; return;}
  detailOpen.add(npi);
  const dist=Number.isFinite(p.pin_lat)&&Number.isFinite(p.pin_lon)?haversineMiles(ELISEAI_LAT,ELISEAI_LON,p.pin_lat,p.pin_lon):NaN;
  const marker=pinProvider(p); if(marker){marker.openPopup(); map.setView(marker.getLatLng(),15);}
  const pen = Number.isFinite(p.glp1_penetration) ? p.glp1_penetration.toFixed(3) : '—';
  const detail = mode==='glp' ?
    '<div><b>Preloaded contact data</b></div><div class="muted" style="margin-top:6px;">Distance to EliseAI: <b>'+fmtMiles(dist)+'</b></div><div style="margin-top:8px;"><b>Phone:</b> '+esc(p.npi_phone||'—')+' &nbsp; <b>Fax:</b> '+esc(p.npi_fax||'—')+'</div><div style="margin-top:8px;"><b>GLP-1 Penetration:</b> '+esc(pen)+'</div><div style="margin-top:8px;"><b>Primary:</b><br>'+esc(p.npi_location_address||'—')+'</div>'
    : '<div><b>Preloaded contact data</b></div><div class="muted" style="margin-top:6px;">Distance to EliseAI: <b>'+fmtMiles(dist)+'</b></div><div style="margin-top:8px;"><b>Primary:</b><br>'+esc(p.npi_location_address||'—')+'</div><div style="margin-top:8px;"><b>Mailing:</b><br>'+esc(p.npi_mailing_address||'—')+'</div>';
  setDetail(npi, detail);
  const b=document.getElementById('btn-'+npi); if(b)b.textContent='Hide contact';
}

function getVisible(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  let items=PROVIDERS.filter(p=>!q||p.npi.includes(q)||p.name.toLowerCase().includes(q)||(p.city||'').toLowerCase().includes(q)||(p.type||'').toLowerCase().includes(q));
  if(nearest10Mode){items=items.map(p=>({p,d:Number.isFinite(p.pin_lat)&&Number.isFinite(p.pin_lon)?haversineMiles(ELISEAI_LAT,ELISEAI_LON,p.pin_lat,p.pin_lon):Infinity})).sort((a,b)=>a.d-b.d).slice(0,10).map(x=>x.p);}  
  const sortBy=document.getElementById('sortBy').value;
  items.sort((a,b)=>{
    if(sortBy==='name_asc') return (a.name||'').localeCompare(b.name||'');
    if(sortBy==='city_asc') return (a.city||'').localeCompare(b.city||'');
    if(sortBy==='distance_asc'){
      const da=Number.isFinite(a.pin_lat)&&Number.isFinite(a.pin_lon)?haversineMiles(ELISEAI_LAT,ELISEAI_LON,a.pin_lat,a.pin_lon):Infinity;
      const db=Number.isFinite(b.pin_lat)&&Number.isFinite(b.pin_lon)?haversineMiles(ELISEAI_LAT,ELISEAI_LON,b.pin_lat,b.pin_lon):Infinity;
      return da-db;
    }
    return (claimsField(b)||-1)-(claimsField(a)||-1);
  });
  return items;
}

const listEl=document.getElementById('list');
const metaEl=document.getElementById('meta');
function render(){
  const visible=getVisible();
  metaEl.textContent = visible.length+' visible / '+PROVIDERS.length+' total'+(nearest10Mode?' · (Nearest 10 mode)':'');
  listEl.innerHTML='';
  for(const p of visible){
    const dist=Number.isFinite(p.pin_lat)&&Number.isFinite(p.pin_lon)?haversineMiles(ELISEAI_LAT,ELISEAI_LON,p.pin_lat,p.pin_lon):NaN;
    const isOpen=detailOpen.has(p.npi);
    const claims = claimsField(p);
    const benes = benesField(p);
    const div=document.createElement('div'); div.className='card';
    div.innerHTML = '<div class="name">'+esc(p.name)+'</div>'+
      '<div class="tiny">NPI '+esc(p.npi)+' · '+esc(p.city||'')+' · '+esc(p.type||'')+' · Claims: <b>'+Math.round(claims||0).toLocaleString()+'</b></div>'+
      '<div class="chips"><span class="chip">Distance: '+esc(fmtMiles(dist))+'</span><span class="chip">Benes: '+esc(String(Math.round(benes||0).toLocaleString()))+'</span>'+
      (mode==='glp'?('<span class="chip">GLP-1 Penetration: '+(Number.isFinite(p.glp1_penetration)?esc(p.glp1_penetration.toFixed(3)):'—')+'</span><span class="chip">Phone: '+esc(p.npi_phone||'—')+'</span>'):'')+
      '</div>'+
      '<div class="actions"><button id="btn-'+p.npi+'">'+(isOpen?'Hide contact':'Pin + load contact')+'</button><button id="zoom-'+p.npi+'">Zoom</button></div>'+
      '<div class="detail" id="detail-'+p.npi+'"></div>';
    listEl.appendChild(div);
    div.querySelector('#btn-'+p.npi).onclick = () => toggleProvider(p.npi);
    div.querySelector('#zoom-'+p.npi).onclick = () => { const m=pinProvider(p); if(m){m.openPopup(); map.setView(m.getLatLng(),15);} };
  }
}

function setMode(next){
  mode = next;
  PROVIDERS = mode==='glp' ? GLP_DATA : MH_DATA;
  nearest10Mode = false;
  document.getElementById('search').value='';
  clearMapState();
  document.getElementById('tabGLP').classList.toggle('active', mode==='glp');
  document.getElementById('tabMH').classList.toggle('active', mode==='mh');
  document.getElementById('mapTitle').textContent = mode==='glp' ? 'EliseAI NYC Metabolic Provider Map' : 'EliseAI NYC Mental Health Provider Map';
  document.getElementById('sortBy').options[0].textContent = mode==='glp' ? 'Sort: Metabolic Claims (desc)' : 'Sort: Claims (desc)';
  render();
}

document.getElementById('tabGLP').onclick = () => setMode('glp');
document.getElementById('tabMH').onclick = () => setMode('mh');
document.getElementById('allProviders').onclick = () => { for(const p of PROVIDERS) pinProvider(p); fitPins(); render(); };
document.getElementById('clearPins').onclick = () => { clearMapState(); render(); };
document.getElementById('fitPins').onclick = () => fitPins();
document.getElementById('resetView').onclick = () => map.setView([40.744,-73.99],11);
document.getElementById('nearest10').onclick = () => { nearest10Mode=!nearest10Mode; document.getElementById('nearest10').textContent = nearest10Mode ? 'Exit Nearest 10' : 'Nearest 10 to EliseAI'; render(); };
document.getElementById('search').addEventListener('input', render);
document.getElementById('sortBy').addEventListener('change', render);
document.getElementById('exportVisible').onclick = () => {
  const visible=getVisible();
  const headers=['name','npi','city','type','claims','benes','glp1_penetration','npi_phone','npi_fax','npi_location_address','npi_mailing_address','pin_lat','pin_lon','pin_display_name','pin_addr_used','npi_status'];
  const escCsv=(v)=>{const s=String(v??''); return /[",\n\r]/.test(s)?'"'+s.replaceAll('"','""')+'"':s;};
  const csv=[headers.join(',')].concat(visible.map(p=>{
    const row={
      name:p.name,npi:p.npi,city:p.city,type:p.type,
      claims:claimsField(p)??'',benes:benesField(p)??'',
      glp1_penetration:Number.isFinite(p.glp1_penetration)?p.glp1_penetration:'',
      npi_phone:p.npi_phone||'',npi_fax:p.npi_fax||'',
      npi_location_address:p.npi_location_address||'',npi_mailing_address:p.npi_mailing_address||'',
      pin_lat:p.pin_lat,pin_lon:p.pin_lon,pin_display_name:p.pin_display_name||'',pin_addr_used:p.pin_addr_used||'',npi_status:p.npi_status||''
    };
    return headers.map(h=>escCsv(row[h])).join(',');
  })).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='eliseai_combined_visible_export_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
};

render();
</script>
